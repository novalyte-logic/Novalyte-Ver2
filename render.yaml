services:
  - type: web
    name: novalyte-ver2
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: ENABLE_REQUEST_LOGGING
        value: "true"
      - key: ENABLE_ANALYTICS_INGEST
        value: "true"
      - key: ENABLE_CLIENT_ERROR_INGEST
        value: "true"
      - key: APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RELEASE_VERSION
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_ACTION_CONFIRMATION_CODE
        sync: false
